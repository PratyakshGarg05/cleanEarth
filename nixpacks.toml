[phases.setup]
nixPkgs = ["php84", "php84Packages.composer", "php84Extensions.pdo", "php84Extensions.mbstring", "php84Extensions.tokenizer", "php84Extensions.xml"]

[phases.install]
cmds = ["composer install --optimize-autoloader --no-dev --no-interaction --ignore-platform-reqs --no-scripts"]

[start]
cmd = "php artisan serve --host=0.0.0.0 --port=$PORT"
